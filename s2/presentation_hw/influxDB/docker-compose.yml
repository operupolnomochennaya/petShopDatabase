services:
  influxdb3:
    image: influxdb:3-core
    container_name: influxdb3-lab
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
    volumes:
      - influxdb3_data:/var/lib/influxdb3/data
      - influxdb3_plugins:/var/lib/influxdb3/plugins

  influxdb3-explorer:
    image: influxdata/influxdb3-ui:1.8.0
    container_name: influxdb3-explorer
    ports:
      - "8888:8080"
    depends_on:
      - influxdb3
    restart: unless-stopped

volumes:
  influxdb3_data:
  influxdb3_plugins:
