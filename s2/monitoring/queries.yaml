pg_meta:
  query: |
    SELECT
      current_database() AS datname,
      current_setting('server_version') AS pg_version,
      1 AS metric_value;
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - pg_version:
        usage: "LABEL"
        description: "PostgreSQL version"
    - metric_value:
        usage: "GAUGE"
        description: "Helper metric"

pg_active_sessions:
  query: |
    SELECT
      current_database() AS datname,
      count(*) FILTER (WHERE state = 'active') AS active_sessions
    FROM pg_stat_activity
    WHERE datname = current_database();
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - active_sessions:
        usage: "GAUGE"
        description: "Active sessions"

pg_stmt_types:
  query: |
    SELECT
      current_database() AS datname,
      COALESCE(sum(calls) FILTER (WHERE lower(query) LIKE 'select%'), 0) AS select_calls,
      COALESCE(sum(calls) FILTER (WHERE lower(query) LIKE 'insert%'), 0) AS insert_calls,
      COALESCE(sum(calls) FILTER (WHERE lower(query) LIKE 'delete%'), 0) AS delete_calls
    FROM pg_stat_statements;
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - select_calls:
        usage: "COUNTER"
        description: "SELECT calls"
    - insert_calls:
        usage: "COUNTER"
        description: "INSERT calls"
    - delete_calls:
        usage: "COUNTER"
        description: "DELETE calls"
