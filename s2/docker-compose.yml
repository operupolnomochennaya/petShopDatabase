services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: petshop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petshop"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
