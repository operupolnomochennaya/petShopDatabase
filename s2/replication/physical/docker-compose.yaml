services:
  pg-master:
    image: postgres:16
    container_name: pg-master
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop_repl
    ports:
      - "5433:5432"
    volumes:
      - pg_master_data:/var/lib/postgresql/data
      - ./master/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petshop_repl"]
      interval: 5s
      timeout: 5s
      retries: 20

  pg-replica1:
    image: postgres:16
    container_name: pg-replica1
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop_repl
      PGPASSWORD: replicator_pass
    ports:
      - "5434:5432"
    depends_on:
      pg-master:
        condition: service_healthy
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c listen_addresses='*'

  pg-replica2:
    image: postgres:16
    container_name: pg-replica2
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop_repl
      PGPASSWORD: replicator_pass
    ports:
      - "5435:5432"
    depends_on:
      pg-master:
        condition: service_healthy
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c listen_addresses='*'

volumes:
  pg_master_data:
  pg_replica1_data:
  pg_replica2_data:
